version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: openbench-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: openbench_test_db
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openbench_test_db"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: "no"

  backend-api-test:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: openbench-backend-api-test
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      - APP_ENV=test
      - PORT=8080
      - DB_HOST=postgres-test
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=test_password
      - DB_NAME=openbench_test_db
      - DB_SSLMODE=disable
    ports:
      - "127.0.0.1:8081:8080"
    restart: "no"

  frontend-web-test:
    profiles:
      - frontend
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: openbench-frontend-web-test
    depends_on:
      - backend-api-test
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUBLIC_API_URL=http://localhost:8081
    ports:
      - "127.0.0.1:3001:3000"
    restart: "no"
