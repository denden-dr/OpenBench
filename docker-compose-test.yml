version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: openbench-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: openbench_test_db
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openbench_test_db"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: "no"

  migration-test:
    image: docker.io/migrate/migrate:v4.17.0
    container_name: openbench-migration-test
    depends_on:
      postgres-test:
        condition: service_healthy
    volumes:
      - ./apps/backend/migrations:/migrations:z
    command:
      - -path=/migrations
      - -database=postgres://postgres:test_password@postgres-test:5432/openbench_test_db?sslmode=disable
      - up

  backend-api-test:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: openbench-backend-api-test
    depends_on:
      postgres-test:
        condition: service_healthy
      migration-test:
        condition: service_completed_successfully
    environment:
      - APP_ENV=test
      - PORT=8080
      - DB_HOST=postgres-test
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=test_password
      - DB_NAME=openbench_test_db
      - DB_SSLMODE=disable
      - CORS_ALLOWED_ORIGINS=http://localhost:3001,http://localhost:5173
      - JWT_SECRET=test_jwt_secret_for_signing_tokens_locally_1234
    ports:
      - "127.0.0.1:8081:8080"
    restart: "no"

  frontend-web-test:
    profiles:
      - frontend
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: openbench-frontend-web-test
    depends_on:
      - backend-api-test
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUBLIC_API_URL=http://localhost:8081
      - PUBLIC_MOCK_API=false
    ports:
      - "127.0.0.1:3001:3000"
    restart: "no"
