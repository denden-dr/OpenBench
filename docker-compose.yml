version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openbench-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openbench
    volumes:
      - ./postgres-data:/var/lib/postgresql/data:Z
