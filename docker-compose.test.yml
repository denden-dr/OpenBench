version: '3.8'

services:
  test-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: openbench_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d openbench_test"]
      interval: 2s
      timeout: 5s
      retries: 5

  test-migrate:
    image: docker.io/migrate/migrate:latest
    user: "root"
    volumes:
      - ./migrations:/migrations:ro,z
    command: ["-path", "/migrations", "-database", "postgres://testuser:testpassword@test-db:5432/openbench_test?sslmode=disable", "up"]
    depends_on:
      test-db:
        condition: service_healthy

  test-seed:
    image: openbench-test-base:latest
    command: ["./seed"]
    environment:
      - APP_ENV=testing
      - APP_NAME=OpenBenchTest
      - PORT=3000
      - CORS_ALLOWED_ORIGINS=http://test-app:3000,http://localhost:3000
      - APP_ENCRYPTION_KEY=12345678901234567890123456789012
      - JWT_ACCESS_SECRET=supersecretaccesssecret123456789
      - JWT_REFRESH_SECRET=supersecretrefreshsecret123456789
      - DB_HOST=test-db
      - DB_USER=testuser
      - DB_PASSWORD=testpassword
      - DB_NAME=openbench_test
      - DB_PORT=5432
    depends_on:
      test-migrate:
        condition: service_completed_successfully

  test-app:
    image: openbench-test-base:latest
    environment:
      - APP_ENV=testing
      - APP_NAME=OpenBenchTest
      - PORT=3000
      - CORS_ALLOWED_ORIGINS=http://test-app:3000,http://localhost:3000
      - APP_ENCRYPTION_KEY=12345678901234567890123456789012
      - JWT_ACCESS_SECRET=supersecretaccesssecret123456789
      - JWT_REFRESH_SECRET=supersecretrefreshsecret123456789
      - DB_HOST=test-db
      - DB_USER=testuser
      - DB_PASSWORD=testpassword
      - DB_NAME=openbench_test
      - DB_PORT=5432
    ports:
      - "3000:3000"
    depends_on:
      test-seed:
        condition: service_completed_successfully
      test-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 2s
      timeout: 5s
      retries: 5

