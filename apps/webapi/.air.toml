root = "."
tmp_dir = "tmp"

[build]
  # Builds the go binary
  cmd = "go build -o ./tmp/main ./cmd/server"
  
  # The binary to execute
  bin = "./tmp/main"
  
  # Watch these extensions for changes
  include_ext = ["go", "json"]
  
  # Ignore the tmp directory where the binary is built, and vendor
  exclude_dir = ["tmp", "vendor"]
  
  # Exclude test files from triggering hot reload
  exclude_regex = ["_test\\.go$"]
  
  # Delay before building (ms) to allow multiple saves to register as one event
  delay = 1000
  
  # Stop the old process before building the new one
  kill_delay = 500
  
  # Send an interrupt signal instead of a kill signal for graceful shutdown
  send_interrupt = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Clean the tmp directory on exit
  clean_on_exit = true
