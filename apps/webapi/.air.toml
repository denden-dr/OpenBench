root = "."
tmp_dir = "tmp"

[build]
  # This command compiles templ, builds tailwind CSS, and builds the go binary
  cmd = "make templ && make tailwind-build && go build -o ./tmp/main ./cmd/server"
  
  # The binary to execute
  bin = "./tmp/main"
  
  # Watch these extensions for changes
  include_ext = ["go", "templ", "css", "html", "js"]
  
  # Ignore the tmp directory where the binary is built, vendor, and static css output
  exclude_dir = ["tmp", "vendor"]
  
  # Specifically exclude generated files to prevent infinite build loops
  exclude_regex = ["_templ\\.go$", "ui/static/css/style\\.css$"]
  
  # Delay before building (ms) to allow multiple saves to register as one event
  delay = 1000
  
  # Stop the old process before building the new one
  kill_delay = 500
  
  # Send an interrupt signal instead of a kill signal for graceful shutdown
  send_interrupt = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Clean the tmp directory on exit
  clean_on_exit = true
